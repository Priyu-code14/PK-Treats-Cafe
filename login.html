<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{
            background: linear-gradient(to right,#8B4513,#d2691e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        .main-box{
            width: 100%;
            max-width: 950px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }
        .left-side{
            background: url('image/login.jpeg');
            background-size: cover;
            background-position: center;
            min-height: 600px;
            position: relative;
        }
        .overlay{
            background: rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }
        .overlay h1{
            font-size: 45px;
            font-weight: bold;
        }
        .overlay p{
            font-size: 18px;
        }
        .form-section{
            padding: 50px 40px;
        }
        .nav-pills .nav-link.active{
            background-color: #8B4513;
        }
        .btn-cafe{
            background-color: #8B4513;
            color: white;
        }
        .btn-cafe:hover{
            background-color: #6f3410;
            color: white;
        }
        .form-control{
            height: 45px;
        }
        @media(max-width:768px){
            .left-side{
                min-height: 250px;
            }
            .overlay h1{
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-box">
        <div class="row g-0">
            <div class="col-md-6 left-side">
                <div class="overlay">
                    <h1>PK Treats Cafe</h1>
                    <p>Fresh Coffee • Delicious Treats • Sweet Moments</p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-section">
                    <ul class="nav nav-pills nav-justified mb-4">
                        <li class="nav-item">
                            <button class="nav-link active"data-bs-toggle="pill"data-bs-target="#login">Login</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#signup">Sign Up</button>
                        </li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="login">
                            <h3 class="mb-4 text-center">Welcome Back</h3>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email"class="form-control" placeholder="Enter email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" placeholder="Enter password" required>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input">
                                        <label class="form-check-label">Remember Me</label>
                                    </div>
                                    <a href="#" class="text-decoration-none">Forgot Password?</a>      
                                </div>
                                <button type="submit" class="btn btn-cafe w-100">Login</button>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="signup">
                            <h3 class="mb-4 text-center">Create Account</h3>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" placeholder="Enter full name" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" placeholder="Enter email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>                                      
                                    <input type="password"  class="form-control" placeholder="Create password" required>                                        
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">
                                        Confirm Password
                                    </label>
                                    <input type="password" class="form-control" placeholder="Confirm password" required>
                                </div>
                                <button type="submit" class="btn btn-cafe w-100">Sign Up</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
