<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Treats Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            font-family: Arial, sans-serif;
        }
        .hero{
            background: url('Image/pk\ treats.jpeg');
            background-size: cover;
            background-position: center;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1{
            font-size: 4rem;
            font-weight: bold;
        }

        .food-card{
            transition: 0.3s;
        }

        .food-card:hover{
            transform: translateY(-10px);
        }

        .cart-badge{
            background: red;
            color: white;
            padding: 2px 8px;
            border-radius: 50%;
        }

        footer{
            background: #212529;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">PK Treats Cafe</a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#home">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#foods">Menu</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link">
                        Cart
                        <span id="cartCount" class="cart-badge">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section id="home" class="hero">
    <div>
        <h1>PK Treats Cafe</h1>
        <p class="lead">Delicious Food Delivered Fast</p>
        <a href="#foods" class="btn btn-warning btn-lg">
            Order Now
        </a>
    </div>
</section>

<!-- Menu -->
<section id="foods" class="py-5">
    <div class="container">

        <h2 class="text-center mb-5">Our Menu</h2>

        <div class="row g-4">

            <!-- Food 1 -->
            <div class="col-md-4">
                <div class="card food-card shadow">
                    <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591"
                         class="card-img-top"
                         height="250">

                    <div class="card-body text-center">
                        <h5>Pizza</h5>
                        <p>₹299</p>

                        <button class="btn btn-success"
                                onclick="addToCart()">
                            Add To Cart
                        </button>
                    </div>
                </div>
            </div>

            <!-- Food 2 -->
            <div class="col-md-4">
                <div class="card food-card shadow">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd"
                         class="card-img-top"
                         height="250">

                    <div class="card-body text-center">
                        <h5>Burger</h5>
                        <p>₹199</p>

                        <button class="btn btn-success"
                                onclick="addToCart()">
                            Add To Cart
                        </button>
                    </div>
                </div>
            </div>

            <!-- Food 3 -->
            <div class="col-md-4">
                <div class="card food-card shadow">
                    <img src="Image/pasta.jpg"
                         class="card-img-top"
                         height="250">

                    <div class="card-body text-center">
                        <h5>Pasta</h5>
                        <p>₹249</p>

                        <button class="btn btn-success"
                                onclick="addToCart()">
                            Add To Cart
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Contact Form -->
<section id="contact" class="bg-light py-5">

    <div class="container">
        <h2 class="text-center mb-4">Contact Us</h2>

        <form id="contactForm">

            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       id="name"
                       placeholder="Enter Name">
            </div>

            <div class="mb-3">
                <input type="email"
                       class="form-control"
                       id="email"
                       placeholder="Enter Email">
            </div>

            <div class="mb-3">
                <textarea class="form-control"
                          rows="4"
                          placeholder="Message"></textarea>
            </div>

            <button type="submit"
                    class="btn btn-primary">
                Submit
            </button>

        </form>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 PK Treats Cafe | All Rights Reserved</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let cart = 0;

    function addToCart() {
        cart++;
        document.getElementById("cartCount").innerText = cart;
        alert("Item Added To Cart");
    }

    document.getElementById("contactForm")
        .addEventListener("submit", function(e){
        e.preventDefault();
        let name =
            document.getElementById("name").value;
        let email =
            document.getElementById("email").value;
        if(name === "" || email === ""){
            alert("Please Fill All Fields");
        }
        else{
            alert("Form Submitted Successfully");
        }
    });
</script>

</body>
</html>
