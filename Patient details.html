<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Details</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: whitesmoke;
    }
    input,select 
    {
        padding: 8px;
        margin-top: 5px;
        border: 1px solid lightgrey;
    }
    label {
        margin-top: 2px;
        font-weight: bold;
    }
    button {
        margin-top: 10px;
        padding: 10px 20px;
        background-color: darkgrey;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover {
        background-color: grey;
    }
    .row input, .row select {
        flex: 1;
    }
    .row {
        display: flex;
        gap: 10px;
    }
    .container {
        width: 100vh;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border: 1px solid lightgrey;
    }
    .sub:hover{
        cursor: pointer;
    }

</style>
</head>
<body>
    <form>
    <div class="container">
    <fieldset>
    <legend></legend>
    <h1>Patient Details</h1>
    <p>Please fill the form below and we will get back soon to you.A confirmation email will be sent to you.</p>
    <label>Name</label><br>
    <div class="row">
    <input type="name" placeholder="First">
    <input type="name" placeholder="Middle">
    <input type="name" placeholder="Last"><br>
    </div>
    <label>Email</label><br>
    <input type="email" placeholder="person@example.com"><br>
    <label>Address</label><br>
    <input type="text" placeholder="Address Line1"><br>
    <input type="text" placeholder="Address Line2"><br>
    <div class="row">
    <input type="text" placeholder="City">
    <select>
        <option value="Region">Region  </option><br>
    </select><br>
    </div> 
    <div class="row"> 
    <input type="number" placeholder="Postal/Zip Code">
    <select>
        <option value="United States">United States</option>
        <option value="India">India</option>
        <option value="United Kingdom">United Kingdom</option>   
    </select><br>
    </div>  
    <label>From</label><br>
    <div class="row">
    <input type="date" placeholder="mm/dd/yyyy">
    <input type="time" placeholder="HH:MM"><br>
    </div>
    <label>To</label><br>
    <div class="row">
    <input type="date" placeholder="mm/dd/yyyy">
    <input type="time" placeholder="HH:MM"><br>
    </div>
    <div class ="sub">   
    <input type="submit" value="Create appointment">
    </div>
    </fieldset>
    </div>
    </form>
     
</body>
</html>
