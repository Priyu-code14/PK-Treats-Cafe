<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
    }
    .one {
        background-color: aqua;
        margin: 5px;
        height: 100px;
        flex-basis:  20%;
    }
    .two {
        background-color: violet;
        margin: 5px;
        height: 100px;
        flex-basis: 20%;
    }
    .three {
        background-color: yellow;
        margin: 5px;
        height: 100px;
        flex-basis: 20%;
    }
    .four {
        background-color: brown;
        margin: 5px;
        height: 100px;
        flex-basis: 20%;
    }
    @media screen and (max-width:800px) {
        .one{
            flex-basis: 40%;
        }
    }
    @media screen and (max-width:800px) {
        .two{
            flex-basis: 40%;
        }
    }
    @media screen and (max-width:800px) {
        .three{
            flex-basis: 40%;
        }
    }
    @media screen and (max-width:800px) {
        .four{
            flex-basis: 40%;
        }
    }
    @media screen and (max-width:600px) {
        .one{
            flex-basis: 100%;
        }
    }
    @media screen and (max-width:600px) {
        .two{
            flex-basis: 100%;
        }
    }
    @media screen and (max-width:600px) {
        .three{
            flex-basis: 100%;
        }
    }
    @media screen and (max-width:600px) {
        .four{
            flex-basis: 100%;
        }
    }  
</style>
<body>
    <div class="container">
        <div class="one"></div>
        <div class="two"></div>
        <div class="three"></div>
        <div class="four"></div>
    </div>
</body>
</html>
