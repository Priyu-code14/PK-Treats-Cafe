<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet"/>
    <title>Responsive Bootstrap Form</title>
    <style>
        body{
            background-color: #f5f5f5;
        }
        .form-container{
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid bg-white text-dark rounded">
        <div class="form-container p-4">
            <h2 class="text-center mb-4">Welcome To PK Treats!</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Enter password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Select a Course</label>
                    <select class="form-select">
                        <option>HTML</option>
                        <option>CSS</option>
                        <option>Bootstrap</option>
                        <option>JavaScript</option>
                        <option>Python</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label d-block">Select Gender</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">Female</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">Others</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label d-block">Select Your Hobbies</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Reading</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Travelling</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Music</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Select Favorite Color</label>
                    <input type="color" class="form-control form-control-color">
                </div>
                <div class="mb-3">
                    <label class="form-label">Select Date of Birth</label>
                    <input type="date" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Upload Resume</label>
                    <input type="file" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Give Your Feedback</label>
                    <textarea
                        class="form-control"
                        rows="4"
                        placeholder="Enter comments"
                    ></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">
                        Submit
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
