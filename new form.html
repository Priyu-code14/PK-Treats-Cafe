<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Student Information</legend>
            <label>First Name</label>
            <input type="name" placeholder="Enter your first name" size="50"><br>
            <label>Last Name</label>
            <input type="name" placeholder="Enter your last name"><br>
            <label>Age</label>
            <input type="number" placeholder="Enter your age" min="18" max="25" title="Enter valid Age"><br>
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your 10digit number" pattern="[0-9]{10}" title="Enter your correct number"><br>
            <input type="submit" value="Submit">
            
        </fieldset>
    </form>
</body>
</html>
